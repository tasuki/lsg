<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Quiz taskiego 2026</title>
    <link rel="stylesheet" href="/public/css/wgo.player.css" />
    <link rel="stylesheet" href="/public/css/fonts.css" />
    <style>
    body { font-family: 'Alegreya Sans'; font-variant-numeric: lining-nums tabular-nums; }
    .remark-slide-content { font-size: 30px; line-height: 40px; }
    .answer {
      box-sizing: border-box;
      display: inline-flex;
      align-items: baseline;
      width: calc(50% - .4em);
      margin: .25em 0;
      font-size: 40px;
    }
    .label {
      display: inline-block;
      min-width: 1.6em;
      margin-right: .35em;
      font-weight: 700;
    }
    .remark-slide-content img {
      display: block;
      width: 100%;
      margin: .75em auto 0;
    }
    .compact-answers .answer {
      display: flex;
      align-items: flex-start;
      width: 100%;
      margin: .1em 0;
      font-size: 28px;
      line-height: 32px;
    }
    .compact-answers .answer img {
      width: auto;
      max-height: 180px;
      margin: 0 0 0 auto;
    }
    ol, ul { line-height: 1.2em; }
    h1, h2, h3 {
      margin: .5em 0 .5em 0;
      line-height: 1em;
    }
    code { line-height: 1.2em; }
    </style>
  </head>
  <body>
    <script type="text/javascript" src="/public/js/wgo.min.js"></script>
    <script type="text/javascript" src="/public/js/wgo.player.min.js"></script>
    <script src="/public/js/remark.min.js"></script>
    <script>
    var slideshow = remark.create({
      sourceUrl: 'quiz.md',
    });

    function initWgoDiagram(el) {
      if (el._wgo_player || !window.WGo || !WGo.BasicPlayer) return;

      var sgf = el.getAttribute('data-wgo-sgf');
      var autoplay = el.getAttribute('data-wgo-autoplay');
      el.classList.add('wgo-diagram');
      el.removeAttribute('data-wgo-sgf');

      el._wgo_player = new WGo.BasicPlayer(el, {
        sgfFile: sgf,
        enableWheel: false,
        enableKeys: false,
        markLastMove: false,
        layout: { top: [], right: [], left: [], bottom: [] },
        update: function(e) {
          if (e.op !== 'init') return;

          if (autoplay !== null && !e.target._autoplayTimer) {
            var delay = 1000 / (parseFloat(autoplay) || 5);
            e.target.first();
            var playNext = function() {
              if (e.target.kifuReader.node.children.length) {
                e.target.next();
                e.target._autoplayTimer = setTimeout(playNext, e.target.kifuReader.node.children.length ? delay : 1000);
              } else {
                e.target.first();
                e.target._autoplayTimer = setTimeout(playNext, 1000);
              }
            };
            e.target._autoplayTimer = setTimeout(playNext, 1000);
          } else if (autoplay === null && !e.target._jumpedToLast) {
            e.target._jumpedToLast = true;
            requestAnimationFrame(function() {
              e.target.last();
              e.target.updateDimensions();
            });
          }
        }
      });
    }

    function refreshWgoDiagrams() {
      requestAnimationFrame(function() {
        document.querySelectorAll('.remark-visible [data-wgo-sgf]').forEach(initWgoDiagram);
        document.querySelectorAll('.remark-visible .wgo-diagram').forEach(function(el) {
          if (el._wgo_player && el._wgo_player.updateDimensions) {
            el._wgo_player.updateDimensions();
            setTimeout(function() { el._wgo_player.updateDimensions(); }, 50);
          }
        });
      });
    }

    slideshow.on('afterShowSlide', refreshWgoDiagrams);
    window.addEventListener('load', refreshWgoDiagrams);
    </script>
  </body>
</html>
